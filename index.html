<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DAILY TREND BOARD - 오늘의 영상 트렌드</title>
    <!-- Google Fonts: Outfit & Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* --- 프리미엄 디자인 시스템 (Sleek Dark Mode) --- */
        :root {
            --bg-base: #0a0a0f;
            --bg-surface: rgba(255, 255, 255, 0.03);
            --bg-surface-hover: rgba(255, 255, 255, 0.06);
            --border-color: rgba(255, 255, 255, 0.06);
            --border-hover: rgba(255, 255, 255, 0.12);
            --color-text-primary: #f3f4f6;
            --color-text-secondary: #9ca3af;
            --color-text-muted: #6b7280;
            --color-accent-orange: #ff6b00;
            --color-accent-orange-hover: #e05e00;
            --color-accent-blue: #00d4ff;
            --color-accent-blue-hover: #00b6db;
            --transition-smooth: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            --font-outfit: 'Outfit', 'Inter', sans-serif;
            --font-inter: 'Inter', sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: var(--bg-base);
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 107, 0, 0.05) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(0, 212, 255, 0.05) 0px, transparent 50%);
            color: var(--color-text-primary);
            font-family: var(--font-inter);
            min-height: 100vh;
            overflow-x: hidden;
            line-height: 1.5;
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* --- 레이아웃 & 컨테이너 --- */
        .app-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        header {
            margin-bottom: 40px;
            position: relative;
        }

        .brand-subtitle {
            font-family: var(--font-outfit);
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 2px;
            color: var(--color-accent-orange);
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .brand-title {
            font-family: var(--font-outfit);
            font-size: 38px;
            font-weight: 800;
            letter-spacing: -0.5px;
            color: #ffffff;
            margin-bottom: 8px;
        }

        .brand-date {
            font-size: 14px;
            color: var(--color-text-secondary);
        }

        /* --- API 키 입력 패널 --- */
        .api-key-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 16px;
            transition: var(--transition-smooth);
        }

        .api-key-panel.secured {
            border-color: rgba(0, 212, 255, 0.2);
            background: rgba(0, 212, 255, 0.01);
        }

        .api-input-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .api-input-wrapper {
            flex: 1;
            min-width: 280px;
            position: relative;
        }

        .api-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 15px;
            font-family: var(--font-inter);
            transition: var(--transition-smooth);
        }

        .api-input:focus {
            outline: none;
            border-color: var(--color-accent-blue);
            box-shadow: 0 0 0 2px rgba(0, 212, 255, 0.1);
        }

        .btn-primary {
            background: var(--color-text-primary);
            color: var(--bg-base);
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .btn-accent {
            background: var(--color-accent-orange);
            color: #ffffff;
            border: none;
            border-radius: 10px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-accent:hover {
            background: var(--color-accent-orange-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.05);
            color: var(--color-text-primary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 28px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--border-hover);
        }

        .api-guide-text {
            font-size: 13px;
            color: var(--color-text-secondary);
            line-height: 1.6;
        }

        .api-guide-text a {
            color: var(--color-accent-blue);
            text-decoration: none;
            font-weight: 500;
        }

        .api-guide-text a:hover {
            text-decoration: underline;
        }

        /* --- 세그먼트 탭 네비게이션 --- */
        .tab-nav {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 12px;
            overflow-x: auto;
        }

        .tab-button {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            font-size: 16px;
            font-weight: 600;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .tab-button:hover {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.02);
        }

        .tab-button.active {
            color: var(--color-text-primary);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.1);
        }

        /* --- 메인 제어 보드 패널 --- */
        .control-panel {
            background: var(--bg-surface);
            backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 32px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* 가로 스크롤 칩스 */
        .chips-container {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 8px;
            -webkit-overflow-scrolling: touch;
        }

        .chip-button {
            background: rgba(255, 255, 255, 0.02);
            color: var(--color-text-secondary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 8px 18px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
        }

        .chip-button:hover {
            color: var(--color-text-primary);
            border-color: var(--border-hover);
            background: rgba(255, 255, 255, 0.04);
        }

        .chip-button.active {
            color: #ffffff;
            background: var(--color-accent-orange);
            border-color: var(--color-accent-orange);
        }

        /* 정렬 및 상세 필터 폼 */
        .filter-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 16px;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .select-custom {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 16px;
            color: var(--color-text-primary);
            font-size: 14px;
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .select-custom:focus {
            outline: none;
            border-color: var(--color-accent-blue);
        }

        .checkbox-container {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: var(--color-text-secondary);
            cursor: pointer;
            user-select: none;
        }

        .checkbox-custom {
            width: 18px;
            height: 18px;
            accent-color: var(--color-accent-orange);
            cursor: pointer;
        }

        /* 키워드 검색 보드 */
        .search-board {
            display: none;
            flex-direction: column;
            gap: 16px;
        }

        .search-input-group {
            display: flex;
            gap: 12px;
        }

        .search-input {
            flex: 1;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px 18px;
            color: #ffffff;
            font-size: 15px;
            transition: var(--transition-smooth);
        }

        .search-input:focus {
            outline: none;
            border-color: var(--color-accent-orange);
        }

        /* --- 비디오 벤토 그리드 --- */
        .video-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
            margin-top: 16px;
        }

        .video-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: var(--transition-smooth);
            position: relative;
        }

        .video-card:hover {
            transform: translateY(-6px);
            border-color: var(--border-hover);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: var(--bg-surface-hover);
        }

        .thumbnail-container {
            width: 100%;
            position: relative;
            padding-top: 56.25%; /* 16:9 Aspect Ratio */
            background-color: #000000;
        }

        .thumbnail-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .video-badge {
            position: absolute;
            bottom: 12px;
            right: 12px;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(4px);
            color: #ffffff;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            font-family: var(--font-outfit);
        }

        .video-badge.shorts {
            background: var(--color-accent-orange);
            color: #ffffff;
        }

        .video-rank-badge {
            position: absolute;
            top: 12px;
            left: 12px;
            background: var(--color-accent-blue);
            color: var(--bg-base);
            font-family: var(--font-outfit);
            font-weight: 800;
            font-size: 14px;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .video-info-container {
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex: 1;
        }

        .video-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--color-text-primary);
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        .video-title:hover {
            color: var(--color-accent-blue);
        }

        .video-channel {
            font-size: 14px;
            color: var(--color-text-secondary);
            font-weight: 500;
        }

        .video-metadata {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            color: var(--color-text-muted);
            margin-top: auto;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            padding-top: 12px;
        }

        .meta-views {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* --- 상태 메시지 및 스피너 --- */
        .status-message-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 80px 24px;
            text-align: center;
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            margin-top: 16px;
        }

        .spinner {
            width: 48px;
            height: 48px;
            border: 4px solid rgba(255, 107, 0, 0.1);
            border-left-color: var(--color-accent-orange);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .status-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--color-text-primary);
        }

        .status-desc {
            font-size: 14px;
            color: var(--color-text-secondary);
            max-width: 400px;
            line-height: 1.6;
        }

        /* 반응형 모바일 최적화 */
        @media (max-width: 768px) {
            .brand-title {
                font-size: 30px;
            }
            .api-key-panel {
                padding: 16px;
            }
            .control-panel {
                padding: 16px;
            }
            .filter-row {
                flex-direction: column;
                align-items: stretch;
            }
            .filter-group {
                justify-content: space-between;
            }
            .select-custom {
                flex: 1;
            }
        }

        /* 벤치마킹 칩스 및 떡상 뱃지 스타일 */
        .chip-delete-btn {
            background: none;
            border: none;
            color: var(--color-text-secondary);
            font-size: 14px;
            margin-left: 8px;
            cursor: pointer;
            padding: 0;
            display: inline-flex;
            align-items: center;
        }
        .chip-delete-btn:hover {
            color: var(--color-accent-orange);
        }
        .btn-analyze-perf {
            background: rgba(255, 110, 64, 0.15);
            border: 1px solid var(--color-accent-orange);
            color: var(--color-accent-orange);
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 5px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .btn-analyze-perf:hover {
            background: var(--color-accent-orange);
            color: white;
            box-shadow: 0 0 10px rgba(255, 110, 64, 0.4);
        }
        .performance-multiplier-badge {
            background: linear-gradient(135deg, #ff007f, #ff6e40) !important;
            color: white !important;
            box-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
            border: none !important;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 헤더 -->
    <header>
        <div class="brand-subtitle">Daily Trend Board</div>
        <h1 class="brand-title">오늘의 영상 트렌드</h1>
        <div class="brand-date" id="current-date-str">2026년 7월 7일 (화) 기준</div>
    </header>

    <!-- API 키 설정 패널 -->
    <section class="api-key-panel" id="api-panel">
        <div class="api-input-group">
            <div class="api-input-wrapper">
                <input type="password" class="api-input" id="api-key-input" placeholder="YouTube Data API v3 키를 붙여넣기 해주세요">
            </div>
            <button class="btn-primary" id="save-api-btn">저장</button>
            <button class="btn-secondary" id="clear-api-btn" style="display: none;">키 삭제</button>
        </div>
        <div class="api-guide-text" id="api-guide-message">
            키는 서버로 전송되지 않고 현재 웹브라우저의 LocalStorage에 안전하게 보관됩니다. 
            <a href="https://console.cloud.google.com" target="_blank">무료 API 키 발급 방법 알아보기</a>
        </div>
    </section>

    <!-- 세그먼트 탭 -->
    <nav class="tab-nav">
        <button class="tab-button active" id="tab-popular" onclick="switchTab('popular')">유튜브 인기</button>
        <button class="tab-button" id="tab-search" onclick="switchTab('search')">키워드 검색</button>
        <button class="tab-button" id="tab-benchmark" onclick="switchTab('benchmark')">벤치마킹 채널</button>
    </nav>

    <!-- 메인 제어 패널 -->
    <section class="control-panel">
        <!-- 유튜브 인기 탭 제어 -->
        <div id="popular-controls">
            <div class="chips-container" id="category-chips">
                <!-- 자바스크립트로 카테고리 칩 자동 주입 -->
            </div>
        </div>

        <!-- 키워드 검색 탭 제어 (기본 숨김) -->
        <div class="search-board" id="search-controls">
            <div class="search-input-group">
                <input type="text" class="search-input" id="search-query-input" placeholder="키워드 입력 (예: 러닝화, 마라톤 훈련)">
                <button class="btn-accent" id="search-submit-btn">검색</button>
            </div>
        </div>

        <!-- 벤치마킹 채널 제어 패널 (기본 숨김) -->
        <div class="search-board" id="benchmark-controls" style="display: none; flex-direction: column; gap: 10px; width: 100%;">
            <div class="search-input-group">
                <input type="text" class="search-input" id="benchmark-channel-input" placeholder="스파이할 유튜브 채널 ID 입력 (예: UC...)">
                <button class="btn-accent" id="add-benchmark-btn">채널 추가</button>
            </div>
            <div class="chips-container" id="benchmark-chips" style="margin-top: 5px; display: flex; flex-wrap: wrap; gap: 8px;">
                <!-- 등록된 채널 칩스 동적 주입 -->
            </div>
        </div>

        <!-- 공통 필터 영역 -->
        <div class="filter-row">
            <div class="filter-group">
                <select class="select-custom" id="filter-region">
                    <option value="KR" selected>KR 한국</option>
                    <option value="US">US 미국</option>
                    <option value="JP">JP 일본</option>
                    <option value="GB">GB 영국</option>
                </select>
                
                <!-- 검색용 기간 필터 (검색 탭 활성화 시에만 유효) -->
                <select class="select-custom" id="filter-published-after" style="display: none;">
                    <option value="1" selected>최근 1일</option>
                    <option value="7">최근 1주</option>
                    <option value="30">최근 1달</option>
                    <option value="90">최근 3달</option>
                </select>

                <select class="select-custom" id="filter-order" style="display: none;">
                    <option value="relevance" selected>관련성순</option>
                    <option value="viewCount">조회수순</option>
                    <option value="date">최신순</option>
                    <option value="performance">떡상순</option>
                </select>

                <label class="checkbox-container">
                    <input type="checkbox" class="checkbox-custom" id="filter-shorts-only">
                    <span>쇼츠만 보기</span>
                </label>
            </div>
            
            <button class="btn-secondary" id="refresh-btn">새로고침</button>
        </div>
    </section>

    <!-- 비디오 목록 또는 상태 영역 -->
    <main>
        <div class="video-grid" id="video-grid-list">
            <!-- 자바스크립트로 렌더링 카드 주입 -->
        </div>

        <div class="status-message-container" id="status-container">
            <div class="spinner" id="spinner-loader" style="display: none;"></div>
            <div class="status-title" id="status-title-text">API 키가 필요합니다</div>
            <div class="status-desc" id="status-desc-text">
                상단의 입력창에 YouTube API 키를 등록하고 저장해주시면 실시간 비디오 대시보드가 로드됩니다.
            </div>
        </div>
    </main>
</div>

<script>
    // --- 설정 및 변수 ---
    const CATEGORIES = [
        { id: 0, name: "전체" },
        { id: 10, name: "음악" },
        { id: 24, name: "엔터" },
        { id: 20, name: "게임" },
        { id: 17, name: "스포츠" },
        { id: 25, name: "뉴스·정치" },
        { id: 23, name: "코미디" },
        { id: 22, name: "인물·블로그" },
        { id: 26, name: "노하우·스타일" },
        { id: 28, name: "과학기술" },
        { id: 27, name: "교육" },
        { id: 1, name: "영화" }
    ];

    let currentTab = 'popular'; // 'popular' | 'search' | 'benchmark'
    let selectedCategoryId = 0;
    let apiKey = '';
    let rawVideoData = []; // 캐시해서 필터링 전환 속도를 극대화함
    
    // 벤치마킹 채널 데이터 구조 & 채널 평균 조회수 캐시 Map
    let benchmarkChannels = []; // [{"id": "UC...", "name": "채널명"}]
    let channelAverageCache = new Map(); // channelId -> avgViews

    // --- 날짜 포맷팅 ---
    function setTodayDate() {
        const days = ['일', '월', '화', '수', '목', '금', '토'];
        const now = new Date();
        const year = now.getFullYear();
        const month = now.getMonth() + 1;
        const date = now.getDate();
        const day = days[now.getDay()];
        
        document.getElementById("current-date-str").innerText = `${year}년 ${month}월 ${date}일 (${day}) 기준`;
    }

    // --- 카테고리 칩스 렌더링 ---
    function renderCategoryChips() {
        const container = document.getElementById("category-chips");
        container.innerHTML = CATEGORIES.map(cat => `
            <button class="chip-button ${cat.id === selectedCategoryId ? 'active' : ''}" 
                    id="chip-${cat.id}" 
                    onclick="selectCategory(${cat.id})">
                ${cat.name}
            </button>
        `).join('');
    }

    function selectCategory(id) {
        selectedCategoryId = id;
        
        // 클래스 갱신
        document.querySelectorAll(".chip-button").forEach(btn => btn.classList.remove("active"));
        document.getElementById(`chip-${id}`).classList.add("active");

        loadData();
    }

    // --- API 키 관리 ---
    function loadSavedApiKey() {
        const saved = localStorage.getItem("yt_trend_api_key");
        const defaultKey = ""; // 보안을 위해 기본 하드코딩 키는 비워둡니다 (사용자가 키를 직접 저장하여 사용)
        
        if (saved) {
            apiKey = saved;
        } else {
            apiKey = defaultKey;
        }
        
        if (apiKey) {
            document.getElementById("api-key-input").value = "••••••••••••••••••••••••••••••••";
            document.getElementById("api-panel").classList.add("secured");
            document.getElementById("clear-api-btn").style.display = "inline-block";
            document.getElementById("api-guide-message").innerHTML = `
                <span style="color: var(--color-accent-blue); font-weight: 600;">✓ API 키가 웹브라우저에 로드되었습니다.</span> 
                (데이터 로드 준비 완료)
            `;
        }
    }

    // API 저장 함수 수정: 마스킹 입력 방지
    function saveApiKey() {
        const inputVal = document.getElementById("api-key-input").value.trim();
        if (!inputVal) {
            alert("API 키를 올바르게 입력해주세요.");
            return;
        }
        
        if (inputVal.includes("•••")) {
            // 이미 마스킹된 것이면 기존값 유지
            return;
        }

        apiKey = inputVal;
        localStorage.setItem("yt_trend_api_key", apiKey);
        
        document.getElementById("api-key-input").value = "••••••••••••••••••••••••••••••••";
        document.getElementById("api-panel").classList.add("secured");
        document.getElementById("clear-api-btn").style.display = "inline-block";
        document.getElementById("api-guide-message").innerHTML = `
            <span style="color: var(--color-accent-blue); font-weight: 600;">✓ API 키가 성공적으로 로컬 스토리지에 저장되었습니다.</span>
        `;
        
        loadData();
    }

    function clearSavedApiKey() {
        if (confirm("저장된 API 키를 브라우저에서 제거하시겠습니까?")) {
            localStorage.removeItem("yt_trend_api_key");
            apiKey = '';

            document.getElementById("api-panel").classList.remove("secured");
            document.getElementById("clear-api-btn").style.display = "none";
            document.getElementById("api-guide-message").innerHTML = `

                <a href="https://console.cloud.google.com" target="_blank">무료 API 키 발급 방법 알아보기</a>
            `;
            
            // UI 초기화
            document.getElementById("video-grid-list").innerHTML = "";
            showStatus("API 키가 필요합니다", "상단의 입력창에 YouTube API 키를 등록하고 저장해주시면 실시간 비디오 대시보드가 로드됩니다.");

    // --- 비디오 데이터 로드 컨트롤러 ---
    function loadData() {
        if (!apiKey) {
            showStatus("API 키가 필요합니다", "상단의 입력창에 YouTube API 키를 등록하고 저장해주시면 실시간 비디오 대시보드가 로드됩니다.");
            return;
        }

        showLoading();

        if (currentTab === 'popular') {
            fetchPopularVideos();
        } else if (currentTab === 'search') {
            fetchSearchVideos();
        } else if (currentTab === 'benchmark') {
            fetchBenchmarkVideos();
        }

    // --- 1. 유튜브 인기 동영상 API 호출 (chart=mostPopular) ---
    async function fetchPopularVideos() {
        const region = document.getElementById("filter-region").value;
        const categoryParam = selectedCategoryId > 0 ? `&videoCategoryId=${selectedCategoryId}` : "";
        const url = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&chart=mostPopular&regionCode=${region}${categoryParam}&maxResults=30&key=${apiKey}`;

        try {
            const response = await fetch(url);
            if (!response.ok) {
                const errJson = await response.json();
                throw new Error(errJson.error.message || "유튜브 API 호출 에러");
            }
            const data = await response.json();
            
            if (!data.items || data.items.length === 0) {
                if (selectedCategoryId > 0) {
                    const catObj = CATEGORIES.find(c => c.id === selectedCategoryId);
                    const catName = catObj ? catObj.name : "교육";
                    console.warn(`No popular videos for category ${selectedCategoryId}. Falling back to search for "${catName}"...`);
                    
                    currentTab = 'search';
                    document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
                    document.getElementById("tab-search").classList.add("active");
                    document.getElementById("popular-controls").style.display = "none";
                    document.getElementById("search-controls").style.display = "flex";
                    document.getElementById("filter-published-after").style.display = "inline-block";
                    document.getElementById("filter-order").style.display = "inline-block";
                    
                    document.getElementById("search-query-input").value = catName;
                    fetchSearchVideos();
                    return;
                }
                
                showStatus("결과가 없습니다", "선택하신 조건의 인기 동영상을 찾을 수 없습니다.");
                return;
            }

            rawVideoData = data.items.map(item => ({
                id: item.id,
                title: item.snippet.title,
                channelId: item.snippet.channelId,
                channel: item.snippet.channelTitle,
                thumbnail: getBestThumbnail(item.snippet.thumbnails),
                views: item.statistics.viewCount,
                publishedAt: item.snippet.publishedAt,
                duration: item.contentDetails ? item.contentDetails.duration : 'PT0S',
                performanceMultiplier: null
            }));

            renderVideoCards(rawVideoData);

        } catch (error) {
            if (selectedCategoryId > 0) {
                const catObj = CATEGORIES.find(c => c.id === selectedCategoryId);
                const catName = catObj ? catObj.name : "교육";
                console.warn(`Error loading popular videos: ${error.message}. Falling back to search for "${catName}"...`);
                
                currentTab = 'search';
                document.querySelectorAll(".tab-button").forEach(btn => btn.classList.remove("active"));
                document.getElementById("tab-search").classList.add("active");
                document.getElementById("popular-controls").style.display = "none";
                document.getElementById("search-controls").style.display = "flex";
                document.getElementById("filter-published-after").style.display = "inline-block";
                document.getElementById("filter-order").style.display = "inline-block";
                
                document.getElementById("search-query-input").value = catName;
                fetchSearchVideos();
                return;
            }
            showStatus("데이터 로드 실패", error.message);
        }
    }

    // --- 2. 유튜브 키워드 검색 API 호출 (search) ---
    async function fetchSearchVideos() {
        const query = document.getElementById("search-query-input").value.trim();
        if (!query) {
            showStatus("검색어를 입력해주세요", "키워드 입력창에 관심 분야(예: 테슬라, HBM)를 적고 검색을 눌러주십시오.");
            return;
        }

        const region = document.getElementById("filter-region").value;
        const publishedDays = document.getElementById("filter-published-after").value;
        const order = document.getElementById("filter-order").value === "performance" ? "relevance" : document.getElementById("filter-order").value;

        const dateLimit = new Date();
        dateLimit.setDate(dateLimit.getDate() - parseInt(publishedDays));
        const publishedAfter = dateLimit.toISOString();

        let searchUrl = `https://www.googleapis.com/youtube/v3/search?part=snippet&q=${encodeURIComponent(query)}&type=video&regionCode=${region}&order=${order}&publishedAfter=${publishedAfter}&maxResults=30&key=${apiKey}`;
        
        const shortsOnlyChecked = document.getElementById("filter-shorts-only").checked;
        if (shortsOnlyChecked) {
            searchUrl += `&videoDuration=short`;
        }

        try {
            const searchResp = await fetch(searchUrl);
            if (!searchResp.ok) {
                const errJson = await searchResp.json();
                throw new Error(errJson.error.message || "유튜브 API 호출 에러");
            }
            const searchData = await searchResp.json();

            if (!searchData.items || searchData.items.length === 0) {
                showStatus("검색 결과가 없습니다", "다른 키워드로 다시 검색해보십시오.");
                return;
            }

            const videoIds = searchData.items.map(item => item.id.videoId).filter(id => id).join(",");

            if (!videoIds) {
                showStatus("검색 결과가 없습니다", "검색된 항목 중 동영상 정보가 유효하지 않습니다.");
                return;
            }

            const detailUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${videoIds}&key=${apiKey}`;
            const detailResp = await fetch(detailUrl);
            if (!detailResp.ok) {
                throw new Error("상세 비디오 정보를 가져오는데 실패했습니다.");
            }
            const detailData = await detailResp.json();

            rawVideoData = detailData.items.map(item => ({
                id: item.id,
                title: item.snippet.title,
                channelId: item.snippet.channelId,
                channel: item.snippet.channelTitle,
                thumbnail: getBestThumbnail(item.snippet.thumbnails),
                views: item.statistics.viewCount,
                publishedAt: item.snippet.publishedAt,
                duration: item.contentDetails ? item.contentDetails.duration : 'PT0S',
                performanceMultiplier: null
            }));

            renderVideoCards(rawVideoData);

        } catch (error) {
            showStatus("데이터 검색 실패", error.message);
        }
    }

    // --- 3. 벤치마킹 채널 비디오 로드 (activities -> videos -> 떡상 연산) ---
    async function fetchBenchmarkVideos() {
        if (benchmarkChannels.length === 0) {
            showStatus("등록된 채널이 없습니다", "상단의 입력창에 감시하고 싶은 유튜브 채널 ID를 넣고 [채널 추가] 버튼을 눌러 등록해 주십시오.");
            return;
        }

        try {
            const videoPromises = benchmarkChannels.map(async (chan) => {
                try {
                    const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails,snippet&id=${chan.id}&key=${apiKey}`;
                    const chanResp = await fetch(chanUrl);
                    if (!chanResp.ok) return [];
                    const chanData = await chanResp.json();
                    if (!chanData.items || chanData.items.length === 0) return [];
                    
                    const uploadsId = chanData.items[0].contentDetails.relatedPlaylists.uploads;
                    chan.name = chanData.items[0].snippet.title;
                    
                    const playUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&playlistId=${uploadsId}&maxResults=5&key=${apiKey}`;
                    const playResp = await fetch(playUrl);
                    if (!playResp.ok) return [];
                    const playData = await playResp.json();
                    if (!playData.items || playData.items.length === 0) return [];
                    
                    return playData.items.map(item => item.contentDetails.videoId);
                } catch (e) {
                    console.error("Error gathering channel playlist items:", e);
                    return [];
                }
            });

            const results = await Promise.all(videoPromises);
            const allVideoIds = results.flat().filter(id => id).join(",");
            if (!allVideoIds) {
                showStatus("최신 영상이 없습니다", "등록된 채널에서 수집할 수 있는 최근 비디오 정보가 없습니다.");
                return;
            }

            const detailUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet,statistics,contentDetails&id=${allVideoIds}&key=${apiKey}`;
            const detailResp = await fetch(detailUrl);
            if (!detailResp.ok) throw new Error("비디오 세부 데이터 로드 실패");
            const detailData = await detailResp.json();

            saveBenchmarkChannels();
            renderBenchmarkChips();

            rawVideoData = detailData.items.map(item => ({
                id: item.id,
                title: item.snippet.title,
                channelId: item.snippet.channelId,
                channel: item.snippet.channelTitle,
                thumbnail: getBestThumbnail(item.snippet.thumbnails),
                views: item.statistics.viewCount,
                publishedAt: item.snippet.publishedAt,
                duration: item.contentDetails ? item.contentDetails.duration : 'PT0S',
                performanceMultiplier: null
            }));

            const uniqueChannelIds = [...new Set(rawVideoData.map(v => v.channelId))];
            await Promise.all(uniqueChannelIds.map(cid => fetchChannelAverageViews(cid)));

            rawVideoData.forEach(vid => {
                const avg = channelAverageCache.get(vid.channelId) || 0;
                if (avg > 0) {
                    vid.performanceMultiplier = parseFloat((parseInt(vid.views) / avg).toFixed(1));
                } else {
                    vid.performanceMultiplier = 1.0;
                }
            });

            const orderSelect = document.getElementById("filter-order");
            if (orderSelect.value === "relevance") {
                orderSelect.value = "performance";
            }

            renderVideoCards(rawVideoData);

        } catch (error) {
            showStatus("벤치마킹 데이터 로드 실패", error.message);
        }
    }

    // --- 채널 평균 조회수 연산 (최근 5개 기준, API 쿼터 총 3유닛 소모) ---
    async function fetchChannelAverageViews(channelId) {
        if (channelAverageCache.has(channelId)) {
            return channelAverageCache.get(channelId);
        }

        try {
            const chanUrl = `https://www.googleapis.com/youtube/v3/channels?part=contentDetails&id=${channelId}&key=${apiKey}`;
            const chanResp = await fetch(chanUrl);
            if (!chanResp.ok) return 0;
            const chanData = await chanResp.json();
            if (!chanData.items || chanData.items.length === 0) return 0;
            const uploadsId = chanData.items[0].contentDetails.relatedPlaylists.uploads;

            const playUrl = `https://www.googleapis.com/youtube/v3/playlistItems?part=contentDetails&playlistId=${uploadsId}&maxResults=5&key=${apiKey}`;
            const playResp = await fetch(playUrl);
            if (!playResp.ok) return 0;
            const playData = await playResp.json();
            if (!playData.items || playData.items.length === 0) return 0;
            const videoIds = playData.items.map(item => item.contentDetails.videoId).join(",");

            const videoUrl = `https://www.googleapis.com/youtube/v3/videos?part=statistics&id=${videoIds}&key=${apiKey}`;
            const vidResp = await fetch(videoUrl);
            if (!vidResp.ok) return 0;
            const vidData = await vidResp.json();
            if (!vidData.items || vidData.items.length === 0) return 0;

            const totalViews = vidData.items.reduce((sum, item) => sum + parseInt(item.statistics.viewCount || 0), 0);
            const average = Math.round(totalViews / vidData.items.length);
            
            channelAverageCache.set(channelId, average);
            return average;
        } catch (e) {
            console.error("Error fetching channel average view counts:", e);
            return 0;
        }
    }

    // --- 개별 카드 떡상 분석 실행 (레이지 로딩 클릭 액션) ---
    async function analyzeCardPerformance(videoId, channelId, currentViews, btnId) {
        const btn = document.getElementById(btnId);
        if (!btn) return;
        
        btn.innerText = "⚡ 계산중...";
        btn.onclick = null;
        btn.style.opacity = "0.7";

        const avg = await fetchChannelAverageViews(channelId);
        if (avg <= 0) {
            btn.innerText = "⚠️ 분석 실패";
            return;
        }

        const multiplier = (parseInt(currentViews) / avg).toFixed(1);
        btn.innerText = `🚀 ${multiplier}x 떡상`;
        btn.className = "video-badge performance-multiplier-badge";
        btn.style.opacity = "1";

        const target = rawVideoData.find(v => v.id === videoId);
        if (target) {
            target.performanceMultiplier = parseFloat(multiplier);
        }
    }

    // --- 지능형 쇼츠 판별 필터링 및 렌더링 함수 ---
    function renderVideoCards(videos) {
        const grid = document.getElementById("video-grid-list");
        const shortsOnlyChecked = document.getElementById("filter-shorts-only").checked;
        const order = document.getElementById("filter-order").value;
        grid.innerHTML = "";

        let filteredVideos = [...videos];
        
        if (shortsOnlyChecked) {
            filteredVideos = filteredVideos.filter(vid => {
                const totalSeconds = parseISO8601Duration(vid.duration);
                return totalSeconds > 0 && totalSeconds <= 60;
            });
        }

        if (order === 'date') {
            filteredVideos.sort((a, b) => new Date(b.publishedAt) - new Date(a.publishedAt));
        } else if (order === 'viewCount') {
            filteredVideos.sort((a, b) => parseInt(b.views || 0) - parseInt(a.views || 0));
        } else if (order === 'performance') {
            filteredVideos.sort((a, b) => (b.performanceMultiplier || 0) - (a.performanceMultiplier || 0));
        }

        if (filteredVideos.length === 0) {
            hideLoading();
            showStatus("출력할 비디오가 없습니다", "필터 조건에 부합하는 동영상이 없습니다.");
            return;
        }

        hideLoading();

        filteredVideos.forEach((vid, index) => {
            const card = document.createElement("article");
            card.className = "video-card";

            const viewStr = formatViews(vid.views);
            const timeAgoStr = timeAgo(vid.publishedAt);
            const durationSec = parseISO8601Duration(vid.duration);
            const durationDisplay = formatDuration(durationSec);
            const isShorts = durationSec > 0 && durationSec <= 60;

            const badgeHtml = isShorts 
                ? `<span class="video-badge shorts">SHORTS</span>`
                : `<span class="video-badge">${durationDisplay}</span>`;

            let performanceHtml = "";
            const uniqueBtnId = `perf-btn-${vid.id}`;
            
            if (vid.performanceMultiplier !== null) {
                performanceHtml = `<span class="video-badge performance-multiplier-badge">🚀 ${vid.performanceMultiplier}x 떡상</span>`;
            } else {
                performanceHtml = `<button class="btn-analyze-perf" id="${uniqueBtnId}" onclick="analyzeCardPerformance('${vid.id}', '${vid.channelId}', '${vid.views}', '${uniqueBtnId}')">🚀 떡상 분석</button>`;
            }

            const rankHtml = (currentTab === 'popular' && order === 'relevance')
                ? `<div class="video-rank-badge">${index + 1}</div>`
                : "";

            card.innerHTML = `
                <div class="thumbnail-container">
                    <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank">
                        <img src="${vid.thumbnail}" alt="${vid.title}" class="thumbnail-image" loading="lazy">
                    </a>
                    ${badgeHtml}
                    ${rankHtml}
                </div>
                <div class="video-info-container">
                    <a href="https://www.youtube.com/watch?v=${vid.id}" target="_blank" class="video-title">
                        ${vid.title}
                    </a>
                    <div class="video-channel">${vid.channel}</div>
                    <div class="video-metadata">
                        <span class="meta-views">👀 ${viewStr}</span>
                        <span>🕒 ${timeAgoStr}</span>
                    </div>
                    <div style="margin-top: 8px; display: flex; align-items: center; gap: 6px;">
                        ${performanceHtml}
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    // --- 벤치마킹 채널 관리 로직 ---
    function loadBenchmarkChannels() {
        const saved = localStorage.getItem("yt_benchmark_channels");
        if (saved) {
            benchmarkChannels = JSON.parse(saved);
        } else {
            benchmarkChannels = [
                { id: "UC1FmJv_p1_x2qP9S3pZ8Qrg", name: "2고수클래스" }
            ];
            saveBenchmarkChannels();
        }
        renderBenchmarkChips();
    }

    function saveBenchmarkChannels() {
        localStorage.setItem("yt_benchmark_channels", JSON.stringify(benchmarkChannels));
    }

    function renderBenchmarkChips() {
        const container = document.getElementById("benchmark-chips");
        if (!container) return;
        container.innerHTML = benchmarkChannels.map(chan => `
            <span class="chip-button" style="display: inline-flex; align-items: center; padding: 6px 12px; font-size: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px;">
                ${chan.name}
                <button class="chip-delete-btn" onclick="removeBenchmarkChannel('${chan.id}')" title="삭제">×</button>
            </span>
        `).join('');
    }

    async function addBenchmarkChannel() {
        const input = document.getElementById("benchmark-channel-input");
        const val = input.value.trim();
        if (!val) {
            alert("채널 ID를 입력해 주십시오.");
            return;
        }

        if (benchmarkChannels.some(c => c.id === val)) {
            alert("이미 등록된 채널입니다.");
            input.value = "";
            return;
        }

        try {
            const url = `https://www.googleapis.com/youtube/v3/channels?part=snippet&id=${val}&key=${apiKey}`;
            const resp = await fetch(url);
            if (!resp.ok) throw new Error();
            const data = await resp.json();
            if (!data.items || data.items.length === 0) {
                alert("유효하지 않은 채널 ID이거나 조회가 불가능합니다. UC로 시작하는 채널 고유 ID를 정확히 넣어주십시오.");
                return;
            }
            
            const name = data.items[0].snippet.title;
            benchmarkChannels.push({ id: val, name: name });
            saveBenchmarkChannels();
            renderBenchmarkChips();
            input.value = "";
            loadData();
        } catch (e) {
            alert("채널 상세 정보를 조회하는 도중 에러가 발생했습니다. API 키나 채널 ID를 검토하십시오.");
        }
    }

    function removeBenchmarkChannel(id) {
        if (confirm("이 채널을 감시망에서 삭제하시겠습니까?")) {
            benchmarkChannels = benchmarkChannels.filter(c => c.id !== id);
            saveBenchmarkChannels();
            renderBenchmarkChips();
            loadData();
        }
    }

    // --- 헬퍼: 썸네일 해상도 최적화 ---
    function getBestThumbnail(thumbnails) {
        if (!thumbnails) return "https://images.unsplash.com/photo-1611162617213-7d7a39e9b1d7?w=500";
        if (thumbnails.maxres) return thumbnails.maxres.url;
        if (thumbnails.standard) return thumbnails.standard.url;
        if (thumbnails.high) return thumbnails.high.url;
        if (thumbnails.medium) return thumbnails.medium.url;
        return thumbnails.default.url;
    }

    // --- 헬퍼: ISO 8601 Duration -> 초(Seconds) 변환 ---
    function parseISO8601Duration(duration) {
        const match = duration.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
        if (!match) return 0;
        const hours = (parseInt(match[1]) || 0);
        const minutes = (parseInt(match[2]) || 0);
        const seconds = (parseInt(match[3]) || 0);
        return (hours * 3600) + (minutes * 60) + seconds;
    }

    // --- 헬퍼: 재생 시간 텍스트 포맷 (예: 1:30, 0:45) ---
    function formatDuration(totalSeconds) {
        if (totalSeconds <= 0) return "0:00";
        const hrs = Math.floor(totalSeconds / 3600);
        const mins = Math.floor((totalSeconds % 3600) / 60);
        const secs = totalSeconds % 60;
        
        if (hrs > 0) {
            return `${hrs}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        return `${mins}:${secs.toString().padStart(2, '0')}`;
    }

    // --- 헬퍼: 조회수 포맷터 (시니어용 국문 변환) ---
    function formatViews(views) {
        if (!views) return "조회수 없음";
        const viewCount = parseInt(views);
        if (viewCount >= 100000000) {
            return `${(viewCount / 100000000).toFixed(1)}억회`;
        }
        if (viewCount >= 10000) {
            return `${(viewCount / 10000).toFixed(1)}만회`;
        }
        if (viewCount >= 1000) {
            return `${(viewCount / 1000).toFixed(1)}천회`;
        }
        return `${viewCount}회`;
    }

    // --- 헬퍼: 상대 시간 변환 (time ago) ---
    function timeAgo(dateString) {
        const date = new Date(dateString);
        const now = new Date();
        const seconds = Math.floor((now - date) / 1000);
        
        if (seconds < 60) return "방금 전";
        const minutes = Math.floor(seconds / 60);
        if (minutes < 60) return `${minutes}분 전`;
        const hours = Math.floor(minutes / 60);
        if (hours < 24) return `${hours}시간 전`;
        const days = Math.floor(hours / 24);
        if (days < 30) return `${days}일 전`;
        const months = Math.floor(days / 30);
        if (months < 12) return `${months}달 전`;
        return `${Math.floor(months / 12)}년 전`;
    }

    // --- 로더 및 경고창 UI 제어 ---
    function showLoading() {
        document.getElementById("status-container").style.display = "flex";
        document.getElementById("spinner-loader").style.display = "block";
        document.getElementById("status-title-text").innerText = "실시간 트렌드 분석 중...";
        document.getElementById("status-desc-text").innerText = "유튜브 서버로부터 최신 데이터를 수집하여 벤토 그리드를 구성하고 있습니다.";
        document.getElementById("video-grid-list").style.opacity = "0.3";
    }

    function hideLoading() {
        document.getElementById("status-container").style.display = "none";
        document.getElementById("video-grid-list").style.opacity = "1";
    }

    function showStatus(title, desc) {
        document.getElementById("spinner-loader").style.display = "none";
        document.getElementById("status-container").style.display = "flex";
        document.getElementById("status-title-text").innerText = title;
        document.getElementById("status-desc-text").innerText = desc;
        document.getElementById("video-grid-list").innerHTML = "";
    }
</script>
